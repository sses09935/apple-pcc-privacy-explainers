name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Noto CJK fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - name: Install build dependencies
        run: npm --prefix build ci
      - name: Install Chromium
        working-directory: build
        run: npx playwright install --with-deps chromium
      - name: QA (source purity + refs + schema)
        run: npm --prefix build run qa
      - name: Build site
        run: npm --prefix build run build:html
      - name: Build PDFs (smoke)
        run: node build/build.mjs
      - name: Web debug
        run: node build/debug-web.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
