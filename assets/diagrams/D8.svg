<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="PingFang TC, Hiragino Sans GB, sans-serif">
  <text x="16" y="30" font-size="13" fill="#0a5ad6">2026：PCC on Google Cloud（要求不變）</text>
  <rect x="24" y="56" width="672" height="200" rx="14" fill="none" stroke="#5b6470" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="40" y="80" font-size="12" fill="#5b6470">Google Cloud 機房（NVIDIA GPU）— Apple 完整保留 PCC 軟體控制</text>

  <rect x="48" y="100" width="200" height="80" rx="12" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
  <text x="148" y="130" text-anchor="middle" font-size="12.5" fill="#14161a">每請求網路解析</text>
  <text x="148" y="150" text-anchor="middle" font-size="10" fill="#5b6470">專屬 namespace</text>
  <text x="148" y="165" text-anchor="middle" font-size="10" fill="#5b6470">專屬 process</text>

  <rect x="270" y="100" width="200" height="80" rx="12" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
  <text x="370" y="130" text-anchor="middle" font-size="12.5" fill="#14161a">confidential VM</text>
  <text x="370" y="150" text-anchor="middle" font-size="10" fill="#5b6470">attested 金鑰</text>
  <text x="370" y="165" text-anchor="middle" font-size="10" fill="#5b6470">與外部輸入隔離</text>

  <rect x="492" y="100" width="180" height="80" rx="12" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
  <text x="582" y="130" text-anchor="middle" font-size="12.5" fill="#14161a">硬體帳本</text>
  <text x="582" y="150" text-anchor="middle" font-size="10" fill="#5b6470">append-only 可驗證</text>
  <text x="582" y="165" text-anchor="middle" font-size="10" fill="#5b6470">≥2 獨立廠商信任根</text>

  <text x="360" y="222" text-anchor="middle" font-size="12" fill="#14161a">裝置只信任「經 Apple 密碼學簽核」的 PCC 軟體</text>
  <text x="360" y="244" text-anchor="middle" font-size="11" fill="#c62828">擴展 ≠ 把資料交給 Google 任意處理</text>
</svg>
