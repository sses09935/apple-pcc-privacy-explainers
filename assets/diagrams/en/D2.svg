<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5b6470"/>
    </marker>
  </defs>
  <text x="24" y="30" font-size="12.0" fill="#5b6470">AP (Application Processor) boot chain</text>
  <g font-size="12.0" fill="#14161a">
    <rect x="24"  y="48" width="118" height="50" rx="10" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
    <text x="83"  y="78" text-anchor="middle">Boot ROM</text>
    <rect x="172" y="48" width="118" height="50" rx="10" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="231" y="72" text-anchor="middle">iBoot</text>
    <text x="231" y="89" text-anchor="middle" font-size="9.2" fill="#5b6470">Verify APTicket</text>
    <rect x="320" y="48" width="100" height="50" rx="10" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="370" y="78" text-anchor="middle">SPTM</text>
    <rect x="450" y="48" width="100" height="50" rx="10" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="500" y="78" text-anchor="middle">TXM</text>
    <rect x="580" y="48" width="116" height="50" rx="10" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="638" y="78" text-anchor="middle">kernel</text>
  </g>
  <g stroke="#5b6470" stroke-width="2" marker-end="url(#a2)">
    <line x1="142" y1="73" x2="170" y2="73"/>
    <line x1="290" y1="73" x2="318" y2="73"/>
    <line x1="420" y1="73" x2="448" y2="73"/>
    <line x1="550" y1="73" x2="578" y2="73"/>
  </g>

  <text x="24" y="160" font-size="12.0" fill="#5b6470">SEP (Secure Enclave) independent root of trust</text>
  <g font-size="12.0" fill="#14161a">
    <rect x="24"  y="178" width="130" height="50" rx="10" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
    <text x="89"  y="208" text-anchor="middle">SEPROM</text>
    <rect x="184" y="178" width="130" height="50" rx="10" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="249" y="208" text-anchor="middle">sepOS</text>
  </g>
  <line x1="154" y1="203" x2="182" y2="203" stroke="#5b6470" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="360" y="168" width="336" height="92" rx="10" fill="#fff" stroke="#0a5ad6" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="376" y="196" font-size="12.0" fill="#0a5ad6">Hardware attestation</text>
  <text x="376" y="220" font-size="10.1" fill="#14161a">PKA takes measurements (SEAL_DATA / SEAL_DATA_A)</text>
  <text x="376" y="240" font-size="10.1" fill="#14161a">hashed with the key, signed by DCIK → bound to boot state</text>

  <text x="24" y="298" font-size="10.1" fill="#5b6470">The Boot ROM / SEPROM origin is fused into silicon at manufacture, immutable (not even Apple can change it).</text>
</svg>
