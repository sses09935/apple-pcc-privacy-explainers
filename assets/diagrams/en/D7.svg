<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <text x="16" y="30" font-size="10.4" fill="#0a5ad6">Threat model: three scenarios and the trust boundary</text>
  <rect x="250" y="60" width="220" height="190" rx="14" fill="none" stroke="#0a5ad6" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="360" y="84" text-anchor="middle" font-size="9.6" fill="#0a5ad6">Trust boundary = PCC node</text>
  <text x="360" y="150" text-anchor="middle" font-size="10.4" fill="#14161a">User data</text>
  <text x="360" y="172" text-anchor="middle" font-size="8.8" fill="#5b6470">In memory only; discarded after use</text>

  <g font-size="9.6" fill="#14161a">
    <rect x="20"  y="70" width="190" height="58" rx="10" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="115" y="95"  text-anchor="middle">① Accidental data disclosure</text>
    <text x="115" y="114" text-anchor="middle" font-size="8.0" fill="#5b6470">Isolation / filtering / Ephemeral</text>

    <rect x="20"  y="142" width="190" height="58" rx="10" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="115" y="167" text-anchor="middle">② External intrusion (request)</text>
    <text x="115" y="186" text-anchor="middle" font-size="8.0" fill="#5b6470">PAC / Swift / REM / diffusion</text>

    <rect x="510" y="106" width="190" height="58" rx="10" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="605" y="131" text-anchor="middle">③ Physical / insider access</text>
    <text x="605" y="150" text-anchor="middle" font-size="8.0" fill="#5b6470">Tamper cut-power / anti-replay</text>
  </g>
  <text x="16" y="268" font-size="8.8" fill="#5b6470">Defense in depth: prevent → detect → contain → time-bound → target diffusion. Known limits: coarser sandbox, node homogeneity, no reproducible builds.</text>
</svg>
