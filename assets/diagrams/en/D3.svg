<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a3" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5b6470"/>
    </marker>
  </defs>
  <g font-size="11.5" fill="#14161a">
    <rect x="16"  y="90" width="116" height="60" rx="12" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
    <text x="74"  y="116" text-anchor="middle">Device</text>
    <text x="74"  y="136" text-anchor="middle" font-size="9.2" fill="#5b6470">Prepare + encrypt request</text>

    <rect x="166" y="90" width="116" height="60" rx="12" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="224" y="112" text-anchor="middle">Anonymous relay</text>
    <text x="224" y="130" text-anchor="middle" font-size="9.2" fill="#5b6470">OHTTP relay</text>
    <text x="224" y="145" text-anchor="middle" font-size="9.2" fill="#5b6470">Hides source IP</text>

    <rect x="316" y="90" width="128" height="60" rx="12" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="380" y="112" text-anchor="middle">Node selection</text>
    <text x="380" y="130" text-anchor="middle" font-size="9.2" fill="#5b6470">Verify attestation</text>
    <text x="380" y="145" text-anchor="middle" font-size="9.2" fill="#5b6470">Wrap key to REK</text>

    <rect x="478" y="90" width="116" height="60" rx="12" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
    <text x="536" y="116" text-anchor="middle">PCC node inference</text>
    <text x="536" y="136" text-anchor="middle" font-size="9.2" fill="#5b6470">proxy → compute</text>

    <rect x="628" y="90" width="80" height="60" rx="12" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="668" y="116" text-anchor="middle">Response</text>
    <text x="668" y="136" text-anchor="middle" font-size="9.2" fill="#c62828">Discarded after use</text>
  </g>
  <g stroke="#5b6470" stroke-width="2" marker-end="url(#a3)">
    <line x1="132" y1="120" x2="164" y2="120"/>
    <line x1="282" y1="120" x2="314" y2="120"/>
    <line x1="444" y1="120" x2="476" y2="120"/>
    <line x1="594" y1="120" x2="626" y2="120"/>
  </g>
  <text x="16" y="36" font-size="12.0" fill="#0a5ad6">Request lifecycle (end to end)</text>
  <text x="16" y="206" font-size="10.1" fill="#5b6470">The key is wrapped only to nodes whose measurements match the public transparency log; state is destroyed after the response.</text>
</svg>
