<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <text x="360" y="34" text-anchor="middle" font-size="15" fill="#0a5ad6">PCC's five core requirements</text>
  <g font-size="13" fill="#14161a">
    <rect x="24"  y="64" width="210" height="92" rx="12" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
    <text x="129" y="96"  text-anchor="middle" font-weight="700">① Stateless computation</text>
    <text x="129" y="120" text-anchor="middle" font-size="11" fill="#5b6470">Use once; not retained</text>

    <rect x="255" y="64" width="210" height="92" rx="12" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="360" y="96"  text-anchor="middle" font-weight="700">② Enforceable guarantees</text>
    <text x="360" y="120" text-anchor="middle" font-size="11" fill="#5b6470">By technology, not policy</text>

    <rect x="486" y="64" width="210" height="92" rx="12" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
    <text x="591" y="96"  text-anchor="middle" font-weight="700">③ No privileged access</text>
    <text x="591" y="120" text-anchor="middle" font-size="11" fill="#5b6470">Even Apple cannot bypass</text>

    <rect x="140" y="176" width="210" height="92" rx="12" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="245" y="208" text-anchor="middle" font-weight="700">④ Non-targetability</text>
    <text x="245" y="232" text-anchor="middle" font-size="11" fill="#5b6470">Cannot target a specific user</text>

    <rect x="370" y="176" width="210" height="92" rx="12" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
    <text x="475" y="208" text-anchor="middle" font-weight="700">⑤ Verifiable transparency</text>
    <text x="475" y="232" text-anchor="middle" font-size="11" fill="#5b6470">Externally inspectable software</text>
  </g>
</svg>
