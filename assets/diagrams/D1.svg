<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="PingFang TC, Hiragino Sans GB, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5b6470"/>
    </marker>
  </defs>
  <rect x="24" y="120" width="150" height="60" rx="12" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
  <text x="99" y="146" text-anchor="middle" font-size="15" fill="#14161a">使用者請求</text>
  <text x="99" y="167" text-anchor="middle" font-size="12" fill="#5b6470">在裝置上發起</text>

  <path d="M300,150 L360,110 L420,150 L360,190 z" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
  <text x="360" y="148" text-anchor="middle" font-size="13" fill="#14161a">任務夠簡單？</text>
  <text x="360" y="166" text-anchor="middle" font-size="11" fill="#5b6470">裝置能處理？</text>

  <line x1="174" y1="150" x2="298" y2="150" stroke="#5b6470" stroke-width="2" marker-end="url(#a)"/>

  <rect x="500" y="40" width="196" height="66" rx="12" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
  <text x="598" y="68" text-anchor="middle" font-size="14" fill="#14161a">留在裝置端處理</text>
  <text x="598" y="90" text-anchor="middle" font-size="11" fill="#5b6470">較小的端上模型</text>

  <rect x="500" y="196" width="196" height="66" rx="12" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
  <text x="598" y="224" text-anchor="middle" font-size="14" fill="#0a5ad6">送到 PCC（私有雲端）</text>
  <text x="598" y="246" text-anchor="middle" font-size="11" fill="#5b6470">大型模型、用完即棄</text>

  <path d="M392,118 C440,90 460,76 500,73" fill="none" stroke="#5b6470" stroke-width="2" marker-end="url(#a)"/>
  <text x="446" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">是</text>
  <path d="M392,182 C440,210 460,224 500,228" fill="none" stroke="#5b6470" stroke-width="2" marker-end="url(#a)"/>
  <text x="446" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">否</text>
</svg>
