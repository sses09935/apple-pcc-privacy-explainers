<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="PingFang TC, Hiragino Sans GB, sans-serif">
  <text x="16" y="30" font-size="13" fill="#0a5ad6">威脅模型：三大情境與信任邊界</text>
  <rect x="250" y="60" width="220" height="190" rx="14" fill="none" stroke="#0a5ad6" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="360" y="84" text-anchor="middle" font-size="12" fill="#0a5ad6">信任邊界＝PCC 節點</text>
  <text x="360" y="150" text-anchor="middle" font-size="13" fill="#14161a">使用者資料</text>
  <text x="360" y="172" text-anchor="middle" font-size="11" fill="#5b6470">僅記憶體內、用完即棄</text>

  <g font-size="12" fill="#14161a">
    <rect x="20"  y="70" width="190" height="58" rx="10" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="115" y="95"  text-anchor="middle">① 意外資料揭露</text>
    <text x="115" y="114" text-anchor="middle" font-size="10" fill="#5b6470">隔離/過濾/Ephemeral</text>

    <rect x="20"  y="142" width="190" height="58" rx="10" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="115" y="167" text-anchor="middle">② 外部入侵（請求）</text>
    <text x="115" y="186" text-anchor="middle" font-size="10" fill="#5b6470">PAC/Swift/REM/擴散</text>

    <rect x="510" y="106" width="190" height="58" rx="10" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="605" y="131" text-anchor="middle">③ 實體/內部存取</text>
    <text x="605" y="150" text-anchor="middle" font-size="10" fill="#5b6470">開蓋斷電/anti-replay</text>
  </g>
  <text x="16" y="268" font-size="11" fill="#5b6470">縱深防禦：預防 → 偵測 → 圍堵 → 時間限界 → 目標擴散。已知限界：sandbox 較粗、節點同質性、無 reproducible builds。</text>
</svg>
