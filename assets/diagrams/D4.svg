<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="PingFang TC, Hiragino Sans GB, sans-serif">
  <defs>
    <marker id="a4" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5b6470"/>
    </marker>
  </defs>
  <text x="16" y="30" font-size="13" fill="#0a5ad6">attestation 與透明性日誌</text>

  <rect x="24" y="110" width="150" height="70" rx="12" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
  <text x="99" y="140" text-anchor="middle" font-size="14" fill="#14161a">使用者裝置</text>
  <text x="99" y="162" text-anchor="middle" font-size="10" fill="#5b6470">核對後才封裝金鑰</text>

  <rect x="285" y="40" width="190" height="70" rx="12" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
  <text x="380" y="68" text-anchor="middle" font-size="13" fill="#14161a">透明性日誌</text>
  <text x="380" y="88" text-anchor="middle" font-size="10" fill="#5b6470">append-only、不可竄改</text>
  <text x="380" y="102" text-anchor="middle" font-size="10" fill="#5b6470">移除可被偵測</text>

  <rect x="285" y="190" width="190" height="70" rx="12" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
  <text x="380" y="218" text-anchor="middle" font-size="13" fill="#14161a">PCC 節點</text>
  <text x="380" y="238" text-anchor="middle" font-size="10" fill="#5b6470">提出 attestation</text>
  <text x="380" y="252" text-anchor="middle" font-size="10" fill="#5b6470">（量測值＋公鑰）</text>

  <rect x="560" y="110" width="140" height="70" rx="12" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
  <text x="630" y="140" text-anchor="middle" font-size="13" fill="#0a5ad6">封裝請求金鑰</text>
  <text x="630" y="162" text-anchor="middle" font-size="10" fill="#5b6470">僅給符合者</text>

  <path d="M150,120 C210,90 240,80 285,75" fill="none" stroke="#5b6470" stroke-width="2" marker-end="url(#a4)"/>
  <text x="182" y="62" font-size="10" fill="#5b6470">① 查量測值是否在 log</text>
  <path d="M285,225 C220,210 200,200 174,170" fill="none" stroke="#5b6470" stroke-width="2" marker-end="url(#a4)"/>
  <text x="186" y="205" font-size="10" fill="#5b6470">② 比對</text>
  <path d="M475,150 L558,148" fill="none" stroke="#5b6470" stroke-width="2" marker-end="url(#a4)"/>
  <text x="500" y="140" font-size="10" fill="#2e7d32">③ 相符</text>
</svg>
