<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="PingFang TC, Hiragino Sans GB, sans-serif">
  <text x="360" y="34" text-anchor="middle" font-size="15" fill="#0a5ad6">PCC 五大核心要求</text>
  <g font-size="13" fill="#14161a">
    <rect x="24"  y="64" width="210" height="92" rx="12" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
    <text x="129" y="96"  text-anchor="middle" font-weight="700">① 無狀態運算</text>
    <text x="129" y="120" text-anchor="middle" font-size="11" fill="#5b6470">用完即棄、不留存</text>

    <rect x="255" y="64" width="210" height="92" rx="12" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="360" y="96"  text-anchor="middle" font-weight="700">② 可強制執行的保證</text>
    <text x="360" y="120" text-anchor="middle" font-size="11" fill="#5b6470">由技術而非政策保障</text>

    <rect x="486" y="64" width="210" height="92" rx="12" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
    <text x="591" y="96"  text-anchor="middle" font-weight="700">③ 無特權存取</text>
    <text x="591" y="120" text-anchor="middle" font-size="11" fill="#5b6470">含 Apple 也無法繞過</text>

    <rect x="140" y="176" width="210" height="92" rx="12" fill="#f2f4f7" stroke="#0a5ad6" stroke-width="2"/>
    <text x="245" y="208" text-anchor="middle" font-weight="700">④ 不可被指定目標</text>
    <text x="245" y="232" text-anchor="middle" font-size="11" fill="#5b6470">無法鎖定特定使用者</text>

    <rect x="370" y="176" width="210" height="92" rx="12" fill="#eaf1fd" stroke="#0a5ad6" stroke-width="2"/>
    <text x="475" y="208" text-anchor="middle" font-weight="700">⑤ 可驗證透明性</text>
    <text x="475" y="232" text-anchor="middle" font-size="11" fill="#5b6470">外部可檢查實際軟體</text>
  </g>
</svg>
