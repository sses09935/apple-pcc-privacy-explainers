<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <!-- relaxed person with phone -->
  <circle cx="300" cy="86" r="34" fill="#f2b705"/>
  <path d="M250 200 q0 -64 50 -64 q50 0 50 64 z" fill="#f2b705"/>
  <!-- gentle smile -->
  <path d="M286 92 q14 12 28 0" fill="none" stroke="#2a2730" stroke-width="3" stroke-linecap="round"/>
  <!-- phone in hand -->
  <rect x="356" y="150" width="44" height="64" rx="8" fill="#fff" stroke="#e8743b" stroke-width="3"/>
  <!-- shield with check -->
  <g transform="translate(470,110)">
    <path d="M0 -56 L52 -36 V6 Q52 48 0 70 Q-52 48 -52 6 V-36 Z" fill="#fdeee5" stroke="#e8743b" stroke-width="4"/>
    <path d="M-22 4 L-6 22 L26 -16" fill="none" stroke="#2e7d32" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="360" y="232" text-anchor="middle" font-size="14" fill="#2a2730">Powerful and private — not either-or</text>
</svg>
