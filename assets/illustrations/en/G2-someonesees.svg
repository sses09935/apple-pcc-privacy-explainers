<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <!-- phone left -->
  <rect x="70" y="90" width="80" height="130" rx="12" fill="#fff" stroke="#cfcad2" stroke-width="3"/>
  <rect x="84" y="106" width="52" height="86" rx="6" fill="#f3f1f4"/>
  <!-- envelope flying -->
  <g transform="translate(300,120)">
    <rect x="-40" y="-26" width="80" height="54" rx="6" fill="#fdeee5" stroke="#e8743b" stroke-width="3"/>
    <path d="M-40 -22 L0 6 L40 -22" fill="none" stroke="#e8743b" stroke-width="3"/>
  </g>
  <path d="M158 150 H250" stroke="#cfcad2" stroke-width="3" stroke-dasharray="3 6" stroke-linecap="round"/>
  <path d="M348 140 H470" stroke="#cfcad2" stroke-width="3" stroke-dasharray="3 6" stroke-linecap="round"/>
  <!-- building with peeking eye -->
  <rect x="480" y="60" width="170" height="170" rx="8" fill="#f3f1f4" stroke="#9a929e" stroke-width="3"/>
  <g fill="#cfcad2">
    <rect x="500" y="85" width="26" height="26"/><rect x="540" y="85" width="26" height="26"/><rect x="580" y="85" width="26" height="26"/>
    <rect x="500" y="130" width="26" height="26"/><rect x="580" y="130" width="26" height="26"/>
  </g>
  <!-- eye -->
  <g transform="translate(553,150)">
    <path d="M-28 0 q28 -26 56 0 q-28 26 -56 0 z" fill="#fff" stroke="#c62828" stroke-width="3"/>
    <circle cx="0" cy="0" r="9" fill="#c62828"/>
  </g>
  <text x="565" y="216" text-anchor="middle" font-size="13" fill="#c62828">Someone can see it</text>
</svg>
