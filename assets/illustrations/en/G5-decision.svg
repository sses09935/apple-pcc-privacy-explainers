<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <defs><marker id="g5a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#7a7480"/></marker></defs>
  <!-- phone (decision origin) -->
  <rect x="40" y="100" width="96" height="80" rx="14" fill="#fff" stroke="#e8743b" stroke-width="4"/>
  <circle cx="88" cy="140" r="20" fill="#fdeee5"/>
  <text x="88" y="200" text-anchor="middle" font-size="13" fill="#2a2730">Your phone</text>

  <!-- simple → stays -->
  <path d="M140 120 C220 70 300 66 360 66" fill="none" stroke="#7a7480" stroke-width="3" marker-end="url(#g5a)"/>
  <text x="250" y="58" text-anchor="middle" font-size="12" fill="#2e7d32">Simple tasks</text>
  <rect x="370" y="36" width="210" height="62" rx="12" fill="#fdeee5" stroke="#f2b705" stroke-width="3"/>
  <text x="475" y="64" text-anchor="middle" font-size="14" fill="#2a2730">Done on the phone</text>
  <text x="475" y="84" text-anchor="middle" font-size="11" fill="#7a7480">Never leaves</text>

  <!-- hard → locked cloud -->
  <path d="M140 160 C220 210 300 214 360 214" fill="none" stroke="#7a7480" stroke-width="3" marker-end="url(#g5a)"/>
  <text x="250" y="232" text-anchor="middle" font-size="12" fill="#e8743b">Harder tasks</text>
  <g>
    <path d="M380 232 a30 30 0 0 1 5 -58 a36 36 0 0 1 68 8 a26 26 0 0 1 3 50 z" fill="#fff" stroke="#e8743b" stroke-width="3"/>
    <rect x="412" y="196" width="32" height="28" rx="5" fill="#e8743b"/>
    <path d="M418 196 v-7 a10 10 0 0 1 20 0 v7" fill="none" stroke="#e8743b" stroke-width="3.5"/>
  </g>
  <text x="520" y="206" text-anchor="middle" font-size="14" fill="#2a2730">Sent to the locked cloud</text>
  <text x="520" y="226" text-anchor="middle" font-size="11" fill="#7a7480">Self-clearing, verifiable</text>
</svg>
