<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="PingFang TC, Hiragino Sans GB, sans-serif">
  <defs>
    <marker id="m1a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e8743b"/>
    </marker>
  </defs>
  <text x="360" y="36" text-anchor="middle" font-size="18" fill="#e8743b" font-weight="700">用完就自我清空的房間</text>

  <!-- before -->
  <rect x="60" y="80" width="220" height="170" rx="14" fill="#fdeee5" stroke="#e8743b" stroke-width="3"/>
  <rect x="100" y="150" width="60" height="60" rx="6" fill="#f2b705" opacity="0.85"/>
  <rect x="180" y="130" width="60" height="80" rx="6" fill="#e8743b" opacity="0.7"/>
  <circle cx="135" cy="120" r="16" fill="#e8743b" opacity="0.6"/>
  <text x="170" y="278" text-anchor="middle" font-size="14" fill="#2a2730">處理你的請求時</text>

  <line x1="300" y1="165" x2="420" y2="165" stroke="#e8743b" stroke-width="3" marker-end="url(#m1a)"/>
  <text x="360" y="152" text-anchor="middle" font-size="12" fill="#7a7480">辦完事</text>

  <!-- after (empty) -->
  <rect x="440" y="80" width="220" height="170" rx="14" fill="#fffdfa" stroke="#e8743b" stroke-width="3"/>
  <text x="550" y="175" text-anchor="middle" font-size="15" fill="#7a7480">— 空 —</text>
  <text x="550" y="278" text-anchor="middle" font-size="14" fill="#2a2730">之後什麼都不留</text>
</svg>
